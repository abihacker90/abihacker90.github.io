<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
        integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"
        integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="style.css">
    <title>BinFinder app v.</title>
</head>

<body>
    <header class="container-fluid">
        <nav>
            <span onclick="openNav()"><i class="fa fa-bars fa-2x" aria-hidden="true"></i></span>
        </nav>
        <div class="container-fluid logo">
            <img class="img-fluid mx-auto d-block" src="/assets/logo-01.png" alt="logo" id="logo">
        </div>
    </header>
    <aside>
        <div id="mySidenav" class="sidenav">
            <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
            <a href="#" onclick="dropDown()" id="selective">SZELEKTÍV</a>
            <div id="checkGroup" class="dropdown-content">
                <label for="batteryContainer">Elem konténerek</label>
                <input type="checkbox" id="batteryContainer" name="batteryContainer">
                <br>
                <label for="hazardousWaste">Veszélyes hulladék</label>
                <input id="hazardousWaste" type="checkbox" name="hazardousWaste">
                <br>
                <label for="electricTrash">Elektronikai hulladék</label>
                <input id="electricTrash" type="checkbox" name="electricTrash">
                <br>
                <label for="degradWaste">Lebomló hulladék</label>
                <input id="degradWaste" type="checkbox" name="degradWaste">
                <br>
                <label for="capBin">Kupak gyűjtő</label>
                <input id="capBin" type="checkbox" name="capBin">
            </div>
            <a onclick="openRightNav()" href="#">SZEMÉLYES PROFIL</a>
            <a href="#" onclick="dropDownServices()">SZOLGÁLTATÁSOK</a>
            <div id="servicesGroup" class="services" id="selective">
                <a onclick="notifyPopUp()" href="#">Bejelentés</a>
                <a onclick="wasteRemovePopUp()" href="#">Hulladék elszállítás</a>
                <a onclick="infosPopUp()" href="#">Információk</a>
            </div>
        </div>
    </aside>
    <aside>
        <div id="myRightSidenav" class="sidenav-right">
            <a href="javascript:void(0)" class="closebtn" onclick="closeRightNav()">&times;</a>
            <p>content</p>
            <p>content</p>
            <p>content</p>
        </div>
    </aside>
    <section class="container-fluid">
        <div id="notification" class="informationContent"><p>content</p></div>
        <div id="removewaste" class="informationContent"><p>content</p></div>
        <div id="infos" class="informationContent"><p>content</p></div>
    </section>
    <main>
        <div id="googleMap" style="width: 100%; height: 600px;">map</div>
    </main>
    <script src="script.js"></script>
    <script src="main.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD3KJg4J9uBmp5ndzVcjqPMuU4o4tqt6KE&callback=initMap"></script>
</body>

</html>
